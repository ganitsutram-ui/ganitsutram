<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="author" content="Jawahar R Mallah">
    <meta name="company" content="AITDL">
    <meta name="project" content="GanitSūtram">

    <title>GanitSūtram | Admin CMS</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Unbounded:wght@200;400;700;900&family=DM+Serif+Display:ital@0;1&family=Syne:wght@400;600;700;800&family=Noto+Serif+Devanagari:wght@300;400;700&family=Space+Grotesk:wght@300;400;500;700&display=swap"
        rel="stylesheet">
    
    <!-- DNS prefetch -->
    <link rel="dns-prefetch" href="//fonts.googleapis.com">
    <link rel="dns-prefetch" href="//fonts.gstatic.com">
    

    <!-- Preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- Preload critical font -->
    <link rel="preload" href="https://fonts.gstatic.com/s/spacegrotesk/v15/V8mQoQDjQSkGpu8Xl10K8t1wX8N1pQ.woff2" as="font" type="font/woff2" crossorigin>

    <style id="gs-critical-css">
        :root { --bg-deep: #040110; --fg-main: #ffffff; --accent-primary: #ff5500; }
        body { margin: 0; background: var(--bg-deep); color: var(--fg-main); }
        .gs-nav { position: fixed; width: 100%; z-index: 100; background: rgba(4,1,16,0.95); }
    </style>

    <link rel="stylesheet" href="../../ui-core/css/main.css">
    <link rel="stylesheet" href="../../ui-core/css/cms.css">

    <meta name="description" content="Content Management System.">
    <meta name="keywords" content="Vedic mathematics, GanitSūtram, digital root, nikhilam, ancient maths, AITDL, Jawahar R Mallah">
    <link rel="canonical" href="https://ganitsutram.com/cms.html">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="GanitSūtram">
    <meta property="og:title" content="CMS | GanitSūtram">
    <meta property="og:description" content="Content Management System.">
    <meta property="og:url" content="https://ganitsutram.com/cms.html">
    <meta property="og:image" content="https://ganitsutram.com/assets/og-image.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:locale" content="en_IN">
    <meta property="og:locale:alternate" content="hi_IN">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:site" content="@aitdl">
    <meta name="twitter:title" content="CMS | GanitSūtram">
    <meta name="twitter:description" content="Content Management System.">
    <meta name="twitter:image" content="https://ganitsutram.com/assets/og-image.png">

</head>

<body class="gs-admin-body">
    <a href="#main-content" class="gs-skip-link">Skip to main content</a>

    <!-- ═══════════════════ TOPBAR ═══════════════════ -->
    <header class="cms-topbar">
        <div class="cms-topbar-inner">
            <div class="cms-brand">
                <a href="index.html" class="gs-nav-logo">
                    <span class="gs-nav-logo-dev">गणित</span>GanitSūtram
                </a>
                <span class="gs-badge gs-badge-accent">Admin CMS</span>
            </div>
            <div class="cms-top-actions">
                <a href="index.html" class="cms-back-link">← Back to Portal</a>
                <button id="btnSyncDiscoveries" class="gs-button gs-button-ghost gs-button-sm">
                    Sync Discoveries 🔄
                </button>
                <div id="userBadge" class="cms-user-pill">Admin</div>
            </div>
        </div>
    </header>

    <main class="cms-layout">
        <!-- ═══════════════════ SIDEBAR ═══════════════════ -->
        <aside class="cms-sidebar">
            <div class="cms-sidebar-section">
                <label class="cms-label">Content Type</label>
                <nav class="cms-filter-nav" id="typeFilters">
                    <button class="cms-filter-btn active" data-type="all">All Content</button>
                    <button class="cms-filter-btn" data-type="discovery">Discoveries</button>
                    <button class="cms-filter-btn" data-type="lesson">Lessons</button>
                    <button class="cms-filter-btn" data-type="sutra">Sutras</button>
                    <button class="cms-filter-btn" data-type="concept">Concepts</button>
                    <button class="cms-filter-btn" data-type="announcement">Announcements</button>
                </nav>
            </div>

            <div class="cms-sidebar-section">
                <label class="cms-label">Status</label>
                <div class="cms-status-filters">
                    <select id="statusFilter" class="cms-select">
                        <option value="all">All Statuses</option>
                        <option value="published">Published</option>
                        <option value="draft">Drafts</option>
                        <option value="featured">Featured</option>
                    </select>
                </div>
            </div>

            <div class="cms-sidebar-section">
                <label class="cms-label">Search</label>
                <div class="cms-search-box">
                    <input type="text" id="cmsSearch" placeholder="Search title or body..." class="cms-input">
                </div>
            </div>

            <button id="btnNewContent" class="gs-button gs-button-primary gs-button-full">
                New Content +
            </button>
        </aside>

        <!-- ═══════════════════ CONTENT LIST ═══════════════════ -->
        <section class="cms-main-content">
            <div id="contentPlaceholder" class="cms-placeholder">
                <div class="gs-loader"></div>
                <p>Loading Ganit CMS content...</p>
            </div>

            <div id="listView" class="cms-list-view" style="display: none;">
                <div class="cms-table-wrapper">
                    <table class="cms-table">
                        <thead>
                            <tr>
                                <th>Type</th>
                                <th>Title</th>
                                <th>Status</th>
                                <th>Category</th>
                                <th>Langs</th>
                                <th>Updated</th>
                                <th class="text-right">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="contentTableBody">
                            <!-- Rows injected by JS -->
                        </tbody>
                    </table>
                </div>
                <div class="cms-pagination" id="pagination">
                    <!-- Pagination controls -->
                </div>
            </div>
        </section>

        <!-- ═══════════════════ EDITOR PANEL (Full Screen Modal) ═══════════════════ -->
        <div id="editorOverlay" class="cms-modal-overlay" style="display: none;">
            <div class="cms-editor-panel">
                <header class="cms-editor-header">
                    <div class="cms-editor-title">
                        <h2 id="editorHeading">New Content</h2>
                    </div>
                    <div class="cms-editor-actions">
                        <button id="btnCancel" class="gs-button gs-button-ghost">Cancel</button>
                        <button id="btnSaveDraft" class="gs-button gs-button-ghost">Save Draft</button>
                        <button id="btnPublish" class="gs-button gs-button-primary">Publish →</button>
                    </div>
                </header>

                <div class="cms-editor-body">
                    <form id="cmsForm" class="cms-form">
                        <div class="cms-form-grid">
                            <!-- Metadata Sidebar -->
                            <aside class="cms-editor-meta">
                                <div class="cms-field">
                                    <label>Content Type</label>
                                    <select name="content_type" id="fldType" class="cms-select" required>
                                        <option value="discovery">Discovery</option>
                                        <option value="lesson">Lesson</option>
                                        <option value="sutra">Sutra</option>
                                        <option value="concept">Concept</option>
                                        <option value="announcement">Announcement</option>
                                    </select>
                                </div>
                                <div class="cms-field">
                                    <label>Slug</label>
                                    <input type="text" name="slug" id="fldSlug" class="cms-input"
                                        placeholder="auto-generated">
                                </div>
                                <div class="cms-field">
                                    <label>Icon (Emoji)</label>
                                    <input type="text" name="icon" id="fldIcon" class="cms-input" placeholder="🌟">
                                </div>
                                <div class="cms-field">
                                    <label>Category</label>
                                    <input type="text" name="category" id="fldCategory" class="cms-input"
                                        placeholder="e.g. vedic">
                                </div>
                                <div class="cms-field">
                                    <label>Difficulty</label>
                                    <select name="difficulty" id="fldDifficulty" class="cms-select">
                                        <option value="beginner">Beginner</option>
                                        <option value="intermediate">Intermediate</option>
                                        <option value="advanced">Advanced</option>
                                    </select>
                                </div>
                                <div class="cms-field">
                                    <label>Tags (Comma separated)</label>
                                    <input type="text" name="tags" id="fldTags" class="cms-input">
                                </div>
                                <div class="cms-field">
                                    <label>Sort Order</label>
                                    <input type="number" name="sort_order" id="fldSort" class="cms-input" value="0">
                                </div>
                                <div class="cms-field-inline">
                                    <label><input type="checkbox" name="featured" id="fldFeatured"> Featured</label>
                                </div>
                                <div class="cms-field-inline">
                                    <label><input type="checkbox" name="published" id="fldPublished"> Published</label>
                                </div>

                                <!-- Revision History in Editor -->
                                <div class="cms-revision-box" id="revisionBox" style="display: none;">
                                    <label class="cms-label">Revision History</label>
                                    <ul id="revisionList" class="cms-rev-list">
                                        <!-- Revisions injected here -->
                                    </ul>
                                </div>
                            </aside>

                            <!-- Main Editor Tabs -->
                            <div class="cms-editor-main">
                                <div class="cms-tabs">
                                    <button type="button" class="cms-tab-btn active" data-lang="en">English
                                        (Primary)</button>
                                    <button type="button" class="cms-tab-btn" data-lang="hi">Hindi (Devanagari)</button>
                                    <button type="button" class="cms-tab-btn" data-lang="sa">Sanskrit (Vedic)</button>
                                </div>

                                <div class="cms-tab-content" id="tab-en">
                                    <div class="cms-field">
                                        <label>Title (EN)</label>
                                        <input type="text" name="title_en" id="fldTitleEn"
                                            class="cms-input cms-title-fld" required>
                                    </div>
                                    <div class="cms-field">
                                        <label>Excerpt (Short Summary)</label>
                                        <textarea name="excerpt_en" id="fldExcerptEn" class="cms-textarea-sm"
                                            placeholder="Brief hook for lists..."></textarea>
                                    </div>
                                    <div class="cms-field">
                                        <label>Body (Markdown)</label>
                                        <div class="cms-md-container">
                                            <div class="cms-md-toolbar" data-for="fldBodyEn">
                                                <button type="button" title="Bold (Ctrl+B)"
                                                    data-cmd="bold"><b>B</b></button>
                                                <button type="button" title="Italic (Ctrl+I)"
                                                    data-cmd="italic"><i>I</i></button>
                                                <button type="button" title="Heading" data-cmd="h2">H2</button>
                                                <button type="button" title="Heading" data-cmd="h3">H3</button>
                                                <button type="button" title="List" data-cmd="list">List</button>
                                                <button type="button" title="Code" data-cmd="code">Code</button>
                                                <button type="button" title="Link" data-cmd="link">Link</button>
                                            </div>
                                            <div class="cms-md-split">
                                                <textarea name="body_en" id="fldBodyEn" class="cms-textarea-lg" required
                                                    placeholder="Write your mathematical discovery here..."></textarea>
                                                <div id="previewEn" class="cms-preview-panel gs-markdown"></div>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div class="cms-tab-content" id="tab-hi" style="display: none;">
                                    <div class="cms-field">
                                        <label>शीर्षक (HI)</label>
                                        <input type="text" name="title_hi" id="fldTitleHi"
                                            class="cms-input cms-title-fld font-hi">
                                    </div>
                                    <div class="cms-field">
                                        <label>सारांश (Excerpt HI)</label>
                                        <textarea name="excerpt_hi" id="fldExcerptHi"
                                            class="cms-textarea-sm font-hi"></textarea>
                                    </div>
                                    <div class="cms-field">
                                        <label>विवरण (Body HI - Markdown)</label>
                                        <div class="cms-md-split">
                                            <textarea name="body_hi" id="fldBodyHi"
                                                class="cms-textarea-lg font-hi"></textarea>
                                            <div id="previewHi" class="cms-preview-panel gs-markdown font-hi"></div>
                                        </div>
                                    </div>
                                </div>

                                <div class="cms-tab-content" id="tab-sa" style="display: none;">
                                    <div class="cms-field">
                                        <label>शीर्षकम् (SA)</label>
                                        <input type="text" name="title_sa" id="fldTitleSa"
                                            class="cms-input cms-title-fld font-sa">
                                    </div>
                                    <div class="cms-field">
                                        <label>संक्षेपः (Excerpt SA)</label>
                                        <textarea name="excerpt_sa" id="fldExcerptSa"
                                            class="cms-textarea-sm font-sa"></textarea>
                                    </div>
                                    <div class="cms-field">
                                        <label>विषयः (Body SA - Markdown)</label>
                                        <div class="cms-md-split">
                                            <textarea name="body_sa" id="fldBodySa"
                                                class="cms-textarea-lg font-sa"></textarea>
                                            <div id="previewSa" class="cms-preview-panel gs-markdown font-sa"></div>
                                        </div>
                                    </div>
                                </div>

                                <!-- Media Section -->
                                <section class="cms-media-section">
                                    <h3>Formulae & Examples</h3>
                                    <div id="mediaList" class="cms-media-grid">
                                        <!-- Media items -->
                                    </div>
                                    <button type="button" id="btnAddMedia" class="gs-button gs-button-sm">Add Item
                                        +</button>
                                </section>

                                <div class="cms-field" style="margin-top: 2rem;">
                                    <label>Change Summary (Reviewer Note)</label>
                                    <input type="text" name="change_summary" id="fldChangeSummary" class="cms-input"
                                        placeholder="What changed in this version?">
                                </div>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <footer class="gs-footer">
        <div class="gs-footer-copy">
            © GanitSūtram | Admin CMS | VS 2082 | 2026-03-07
        </div>
    </footer>

    <!-- Scripts -->
    <script src="../../ui-core/js/seo.js" defer></script>
    <script src="../../ui-core/js/ganit-ui.js" defer></script>
    <script src="../../ui-core/js/cms.js" defer></script>
</body>

</html>
